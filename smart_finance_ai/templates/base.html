<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Smart Finance AI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

  <!-- Sidebar Navigation -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">◈</span>
      <span class="brand-text">SmartFinance<em>AI</em></span>
    </div>
    <ul class="sidebar-nav">
      <li>
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
          <i class="bi bi-house-door"></i> Home
        </a>
      </li>
      <li>
        <a href="/upload" class="nav-link {% if request.path == '/upload' %}active{% endif %}">
          <i class="bi bi-cloud-upload"></i> Upload Data
        </a>
      </li>
      <li>
        <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
          <i class="bi bi-bar-chart-line"></i> Dashboard
        </a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <span class="mono-text">v1.0 MVP</span>
    </div>
  </nav>

  <!-- Mobile topbar -->
  <div class="topbar d-flex d-lg-none align-items-center px-3">
    <button class="topbar-toggle me-3" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <span class="brand-text-sm">SmartFinance<em>AI</em></span>
  </div>

  <!-- Main content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script>
    document.getElementById('sidebarToggle')?.addEventListener('click', () => {
      document.querySelector('.sidebar').classList.toggle('open');
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
